<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>رمز التحقق</title>
  </head>
  <body style="font-family: system-ui, 'Segoe UI', sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 32rem; margin: 0 auto; padding: 1.5rem;">
    <h2 style="margin-top: 0;">تأكيد إنشاء الحساب</h2>
    <p>استخدم الرمز التالي في صفحة التسجيل (صالح لمدة محدودة):</p>
    <p style="font-size: 1.75rem; font-weight: 700; letter-spacing: 0.25em; direction: ltr; text-align: center; margin: 1.25rem 0; font-family: ui-monospace, monospace;">
      {{ .Token }}
    </p>
    <p style="font-size: 0.875rem; color: #555;">
      إذا لم تطلب هذا البريد، يمكنك تجاهله.
    </p>
    <hr style="border: none; border-top: 1px solid #e5e5e5; margin: 1.5rem 0;" />
    <p style="font-size: 0.875rem; color: #555;" dir="ltr">
      <strong>Confirm your signup</strong><br />
      Enter this code on the signup page (expires after a short time):
    </p>
    <p style="font-size: 1.5rem; font-weight: 700; letter-spacing: 0.25em; text-align: center; margin: 1rem 0; font-family: ui-monospace, monospace;" dir="ltr">
      {{ .Token }}
    </p>
  </body>
</html>
