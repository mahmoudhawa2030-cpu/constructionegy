<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إعادة تعيين كلمة المرور</title>
  </head>
  <body style="font-family: system-ui, 'Segoe UI', sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 32rem; margin: 0 auto; padding: 1.5rem;">
    <h2 style="margin-top: 0;">إعادة تعيين كلمة المرور</h2>
    <p>انقر على الزر أدناه لإعادة تعيين كلمة المرور (الرابط صالح لمدة ساعة واحدة):</p>
    <p style="text-align: center; margin: 1.5rem 0;">
      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=%2Fupdate-password"
         style="display: inline-block; background: #e67820; color: #fff; font-weight: 700; text-decoration: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem;">
        إعادة تعيين كلمة المرور
      </a>
    </p>
    <p style="font-size: 0.875rem; color: #555;">
      إذا لم تطلب هذا البريد، يمكنك تجاهله بأمان.
    </p>
    <hr style="border: none; border-top: 1px solid #e5e5e5; margin: 1.5rem 0;" />
    <p style="font-size: 0.875rem; color: #555;" dir="ltr">
      <strong>Reset your password</strong><br />
      Click the button below to reset your password (link expires in 1 hour):
    </p>
    <p style="text-align: center; margin: 1rem 0;" dir="ltr">
      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=%2Fupdate-password"
         style="display: inline-block; background: #e67820; color: #fff; font-weight: 700; text-decoration: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem;">
        Reset password
      </a>
    </p>
  </body>
</html>
