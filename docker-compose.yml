# Docker Compose for self-hosted deployment (Hetzner MA200 or any Linux server).
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up -d
#   3. App is available at http://localhost:3000
#
# For production: put Nginx in front for SSL termination and proxy to port 3000.

version: "3.9"

services:
  # ── Next.js application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # When fully migrated off Supabase, point these to local services:
      # - NEXT_PUBLIC_STORAGE_BASE_URL=http://minio:9000/bina
      # - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_STORAGE_BASE_URL=${NEXT_PUBLIC_STORAGE_BASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - PUSH_NOTIFY_SECRET=${PUSH_NOTIFY_SECRET:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (feed cache, sessions) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage — replaces Supabase Storage) ───────
  # Uncomment this block when you are ready to migrate away from Supabase Storage.
  # minio:
  #   image: minio/minio:latest
  #   ports:
  #     - "9000:9000"   # S3 API
  #     - "9001:9001"   # Admin console (http://localhost:9001)
  #   environment:
  #     - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
  #     - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme123}
  #   volumes:
  #     - minio_data:/data
  #   command: server /data --console-address ":9001"
  #   restart: unless-stopped

  # ── PostgreSQL (replaces Supabase DB) ─────────────────────────────────────
  # Uncomment this block when you are ready to migrate away from Supabase DB.
  # postgres:
  #   image: postgres:16-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_USER=${POSTGRES_USER:-bina}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
  #     - POSTGRES_DB=${POSTGRES_DB:-bina}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  redis_data:
  # minio_data:
  # postgres_data:
